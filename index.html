<!DOCTYPE html>
<html lang="zh-TW" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>靈籤 · 智慧求籤</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700;900&amp;family=Noto+Sans+TC:wght@300;400;500;700&amp;display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <!-- 避免深色模式閃白：在 head 內同步讀取並套用主題 -->
    <script>
        (function(){
            var t = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', t);
        })();
    </script>

    <style>
        :root {
            /* Light Mode */
            --bg-primary: #f2f2f7;
            --bg-secondary: #ffffff;
            --bg-card: rgba(255,255,255,0.85);
            --bg-glass: rgba(255,255,255,0.65);
            --bg-input: rgba(118,118,128,0.12);
            --text-primary: #1c1c1e;
            --text-secondary: #636366;
            --text-tertiary: #aeaeb2;
            --accent-red: #c0392b;
            --accent-gold: #d4a017;
            --accent-blue: #007aff;
            --accent-green: #34c759;
            --border: rgba(0,0,0,0.08);
            --shadow-sm: 0 2px 12px rgba(0,0,0,0.06);
            --shadow-md: 0 8px 32px rgba(0,0,0,0.10);
            --shadow-lg: 0 20px 60px rgba(0,0,0,0.14);
            --pot-top: #e53e3e;
            --pot-bot: #9b2335;
            --pot-border: #7b1d2e;
            --overlay-bg: rgba(0,0,0,0.25);
            --tag-bg: #fff1f0;
            --tag-color: #c0392b;
            --grid-bg: rgba(118,118,128,0.08);
            --divider: rgba(0,0,0,0.07);
        }
        [data-theme="dark"] {
            --bg-primary: #000000;
            --bg-secondary: #1c1c1e;
            --bg-card: rgba(28,28,30,0.90);
            --bg-glass: rgba(28,28,30,0.75);
            --bg-input: rgba(255,255,255,0.09);
            --text-primary: #f2f2f7;
            --text-secondary: #aeaeb2;
            --text-tertiary: #636366;
            --accent-red: #ff6b6b;
            --accent-gold: #ffd060;
            --accent-blue: #0a84ff;
            --accent-green: #30d158;
            --border: rgba(255,255,255,0.10);
            --shadow-sm: 0 2px 12px rgba(0,0,0,0.35);
            --shadow-md: 0 8px 32px rgba(0,0,0,0.45);
            --shadow-lg: 0 20px 60px rgba(0,0,0,0.60);
            --pot-top: #c0392b;
            --pot-bot: #7b1d2e;
            --pot-border: #5a1520;
            --overlay-bg: rgba(0,0,0,0.55);
            --tag-bg: rgba(192,57,43,0.18);
            --tag-color: #ff6b6b;
            --grid-bg: rgba(255,255,255,0.06);
            --divider: rgba(255,255,255,0.08);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }

        body {
            font-family: 'Noto Sans TC', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: env(safe-area-inset-top, 16px) 16px env(safe-area-inset-bottom, 24px);
            transition: background 0.4s ease, color 0.4s ease;
            overflow-x: hidden;
        }

        /* ── 背景裝飾紋理 ── */
        body::before {
            content: '';
            position: fixed; inset: 0; pointer-events: none; z-index: 0;
            background-image: 
                radial-gradient(ellipse 60% 50% at 20% 10%, rgba(192,57,43,0.07) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 80% 90%, rgba(212,160,23,0.06) 0%, transparent 60%);
        }
        [data-theme="dark"] body::before {
            background-image: 
                radial-gradient(ellipse 60% 50% at 20% 10%, rgba(192,57,43,0.15) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 80% 90%, rgba(212,160,23,0.12) 0%, transparent 60%);
        }

        /* ── 頂部導航欄 ── */
        .nav-bar {
            width: 100%; max-width: 430px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 4px; position: relative; z-index: 10;
            margin-bottom: 8px;
        }
        .nav-title {
            font-family: 'Noto Serif TC', serif;
            font-size: 1.15em; font-weight: 700;
            color: var(--text-primary);
            letter-spacing: 0.08em;
        }
        .nav-subtitle {
            font-size: 0.72em;
            color: var(--text-tertiary);
            letter-spacing: 0.12em;
            display: block;
            font-weight: 400;
            margin-top: 1px;
        }

        /* ── 深淺模式切換 ── */
        .theme-toggle {
            width: 50px; height: 30px;
            background: var(--bg-input);
            border-radius: 15px;
            border: 1.5px solid var(--border);
            cursor: pointer;
            position: relative;
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            flex-shrink: 0;
        }
        .theme-toggle::after {
            content: '';
            position: absolute;
            top: 3px; left: 3px;
            width: 22px; height: 22px;
            border-radius: 50%;
            background: var(--bg-secondary);
            box-shadow: var(--shadow-sm);
            transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
        }
        [data-theme="dark"] .theme-toggle::after { transform: translateX(20px); }
        .theme-icon {
            position: absolute; top: 50%; transform: translateY(-50%);
            font-size: 12px; pointer-events: none; transition: opacity 0.3s;
        }
        .icon-sun { left: 6px; opacity: 1; }
        .icon-moon { right: 5px; opacity: 0.4; }
        [data-theme="dark"] .icon-sun { opacity: 0.4; }
        [data-theme="dark"] .icon-moon { opacity: 1; }

        /* ── 主容器 ── */
        .main-wrap {
            width: 100%; max-width: 430px;
            display: flex; flex-direction: column; align-items: center;
            gap: 0; position: relative; z-index: 1;
        }

        /* ── 英雄區塊 ── */
        .hero-section {
            width: 100%;
            background: var(--bg-card);
            border-radius: 28px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-md);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 36px 28px 32px;
            text-align: center;
            margin-bottom: 16px;
            position: relative; overflow: hidden;
        }
        .hero-section::before {
            content: '🏮';
            position: absolute;
            font-size: 100px; opacity: 0.04;
            top: -15px; right: -15px;
            pointer-events: none;
        }

        .hero-tag {
            display: inline-flex; align-items: center; gap: 6px;
            background: linear-gradient(135deg, var(--accent-red), var(--accent-gold));
            color: white;
            font-size: 0.72em; font-weight: 700;
            letter-spacing: 0.15em;
            padding: 5px 14px; border-radius: 20px;
            margin-bottom: 16px;
        }

        .hero-title {
            font-family: 'Noto Serif TC', serif;
            font-size: 2.2em; font-weight: 900;
            color: var(--text-primary);
            letter-spacing: -0.01em;
            line-height: 1.1;
            margin-bottom: 8px;
        }
        .hero-title span {
            background: linear-gradient(135deg, var(--accent-red), var(--accent-gold));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-desc {
            color: var(--text-secondary);
            font-size: 0.9em; line-height: 1.6;
            margin-bottom: 32px;
            font-weight: 300;
        }

        /* ── 籤筒 SVG 舞台 ── */
        .pot-wrapper {
            display: flex; flex-direction: column; align-items: center; gap: 18px;
            position: relative;
        }
        .pot-stage {
            position: relative;
            width: 180px; height: 240px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            transition: transform 0.15s;
        }
        .pot-stage svg { overflow: visible; display: block; }
        .pot-label {
            font-family: 'Noto Serif TC', serif;
            font-size: 0.82em; color: var(--text-secondary);
            letter-spacing: 0.2em; font-weight: 500;
            text-align: center; transition: color 0.3s;
        }
        /* 搖晃提示 */
        .shake-hint {
            display: inline-flex; align-items: center; gap: 5px;
            font-size: 0.72em; color: var(--text-tertiary);
            letter-spacing: 0.06em; font-weight: 400;
            margin-top: 2px;
            opacity: 0; transform: translateY(4px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        .shake-hint.visible { opacity: 1; transform: translateY(0); }
        .shake-icon { display: inline-block; animation: phoneRock 1.8s ease-in-out infinite; }
        @keyframes phoneRock {
            0%,100% { transform: rotate(0deg); }
            20%     { transform: rotate(18deg); }
            40%     { transform: rotate(-15deg); }
            60%     { transform: rotate(12deg); }
            80%     { transform: rotate(-10deg); }
        }
        .pot-stage.motion-active .pot-glow {
            background: radial-gradient(ellipse, rgba(192,57,43,0.65) 0%, transparent 70%);
            width: 150px; height: 45px;
        }

        /* 底部光暈 */
        .pot-glow {
            position: absolute;
            bottom: 10px; left: 50%;
            transform: translateX(-50%);
            width: 120px; height: 30px;
            background: radial-gradient(ellipse, rgba(192,57,43,0.35) 0%, transparent 70%);
            filter: blur(8px);
            z-index: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        /* ── 搖晃動畫 ── */
        @keyframes shake {
            0%,100% { transform: rotate(0deg) translateY(0px); }
            8%  { transform: rotate(9deg) translateY(-5px); }
            18% { transform: rotate(-11deg) translateY(0px); }
            28% { transform: rotate(12deg) translateY(-6px); }
            38% { transform: rotate(-9deg) translateY(0px); }
            48% { transform: rotate(10deg) translateY(-5px); }
            58% { transform: rotate(-8deg) translateY(0px); }
            68% { transform: rotate(9deg) translateY(-4px); }
            78% { transform: rotate(-6deg) translateY(0px); }
            88% { transform: rotate(5deg) translateY(-2px); }
        }
        .shaking {
            animation: shake 0.5s infinite cubic-bezier(0.4,0,0.2,1);
            transform-origin: center 90%;
        }

        /* ── 籤枝個別飛出動畫 ── */
        @keyframes flyA {
            0%   { transform: translate(0,0) rotate(0deg);   opacity:1; }
            40%  { transform: translate(-18px,-90px) rotate(-20deg); opacity:1; }
            100% { transform: translate(-30px,-190px) rotate(-35deg); opacity:0; }
        }
        @keyframes flyB {
            0%   { transform: translate(0,0) rotate(0deg);  opacity:1; }
            40%  { transform: translate(5px,-110px) rotate(5deg); opacity:1; }
            100% { transform: translate(8px,-210px) rotate(8deg); opacity:0; }
        }
        @keyframes flyC {
            0%   { transform: translate(0,0) rotate(0deg);  opacity:1; }
            40%  { transform: translate(20px,-95px) rotate(22deg); opacity:1; }
            100% { transform: translate(38px,-195px) rotate(40deg); opacity:0; }
        }
        @keyframes flyD {
            0%   { transform: translate(0,0) rotate(0deg);  opacity:1; }
            40%  { transform: translate(-10px,-75px) rotate(-12deg); opacity:1; }
            100% { transform: translate(-20px,-170px) rotate(-28deg); opacity:0; }
        }

        /* ── 選中籤彈出並懸停 ── */
        @keyframes chosenPop {
            0%   { transform: translateY(0px) rotate(0deg); }
            25%  { transform: translateY(-110px) rotate(-4deg) scale(1.05); }
            50%  { transform: translateY(-145px) rotate(3deg) scale(1.08); }
            68%  { transform: translateY(-125px) rotate(-2deg) scale(1.06); }
            82%  { transform: translateY(-138px) rotate(1deg) scale(1.07); }
            100% { transform: translateY(-132px) rotate(0deg) scale(1.07); }
        }
        /* 選中籤持續懸浮 */
        @keyframes floatHover {
            0%,100% { transform: translateY(-132px) rotate(0deg) scale(1.07); }
            50%     { transform: translateY(-140px) rotate(1deg) scale(1.07); }
        }
        /* 金光閃爍 */
        @keyframes goldGlow {
            0%,100% { filter: drop-shadow(0 0 3px rgba(255,215,0,0.5)); }
            50%     { filter: drop-shadow(0 0 14px rgba(255,215,0,0.95)) drop-shadow(0 0 28px rgba(255,160,0,0.6)); }
        }
        .chosen-stick-group {
            animation: chosenPop 0.9s cubic-bezier(0.34,1.3,0.64,1) forwards;
        }
        .chosen-stick-group.floating {
            animation: floatHover 2s ease-in-out infinite;
        }
        .chosen-stick-group.glowing {
            animation: floatHover 2s ease-in-out infinite, goldGlow 0.9s ease-in-out 4;
        }

        /* ── 擲筊區塊 ── */
        .toss-card {
            display: none;
            width: 100%;
            background: var(--bg-card);
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-md);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 28px 24px;
            margin-bottom: 16px;
            text-align: center;
        }
        .toss-card.visible {
            animation: slideUp 0.5s cubic-bezier(0.23,1,0.32,1);
        }
        .toss-hint {
            font-size: 0.95em; color: var(--text-secondary);
            margin-bottom: 20px; line-height: 1.6;
        }
        .toss-hint strong { color: var(--text-primary); font-weight: 600; }

        /* ── Apple 按鈕 ── */
        .btn-primary {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            background: linear-gradient(135deg, var(--accent-red), #e74c3c);
            color: white; border: none;
            padding: 16px 32px; border-radius: 16px;
            font-size: 1em; font-weight: 700;
            cursor: pointer; width: 100%;
            box-shadow: 0 4px 20px rgba(192,57,43,0.35);
            transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
            letter-spacing: 0.04em;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-primary:active { transform: scale(0.97); box-shadow: 0 2px 10px rgba(192,57,43,0.25); }

        .btn-secondary {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            background: var(--bg-input);
            color: var(--accent-blue); border: none;
            padding: 14px 28px; border-radius: 14px;
            font-size: 0.95em; font-weight: 600;
            cursor: pointer; width: 100%;
            transition: all 0.2s;
            letter-spacing: 0.02em;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-secondary:active { opacity: 0.7; }

        /* ── 結果卡片 ── */
        #result-box {
            display: none;
            width: 100%;
            margin-bottom: 20px;
        }
        #result-box.visible {
            animation: slideUp 0.65s cubic-bezier(0.23,1,0.32,1);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(48px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 籤號橫幅 */
        .result-banner {
            background: linear-gradient(135deg, var(--accent-red) 0%, #c0392b 50%, var(--accent-gold) 100%);
            border-radius: 24px 24px 0 0;
            padding: 28px 28px 24px;
            text-align: center;
            position: relative; overflow: hidden;
        }
        .result-banner::before {
            content: '';
            position: absolute; inset: 0;
            background: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23fff' fill-opacity='0.05'%3E%3Cpath d='M20 20L0 0h40L20 20zM20 20L40 40H0L20 20z'/%3E%3C/g%3E%3C/svg%3E");
        }
        .luck-badge {
            display: inline-flex; align-items: center; gap: 5px;
            background: rgba(255,255,255,0.22);
            border: 1px solid rgba(255,255,255,0.35);
            color: white;
            font-size: 0.78em; font-weight: 700;
            padding: 5px 14px; border-radius: 20px;
            letter-spacing: 0.12em;
            margin-bottom: 12px;
            backdrop-filter: blur(8px);
        }
        .result-name {
            font-family: 'Noto Serif TC', serif;
            font-size: 1.9em; font-weight: 900;
            color: white;
            letter-spacing: 0.1em;
            text-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        /* 籤詩 */
        .poem-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-top: none;
            padding: 28px 24px;
            text-align: center;
        }
        .poem-label {
            font-size: 0.7em; letter-spacing: 0.2em;
            color: var(--text-tertiary); font-weight: 500;
            margin-bottom: 16px; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .poem-label::before, .poem-label::after { content: ''; flex: 1; height: 1px; background: var(--divider); max-width: 40px; }
        .poem-text {
            font-family: 'Noto Serif TC', serif;
            font-size: 1.13em; line-height: 2.3;
            color: var(--text-primary);
            white-space: pre-line;
            font-weight: 500;
            letter-spacing: 0.06em;
        }
        .poem-text em {
            color: var(--accent-red);
            font-style: normal;
            font-weight: 700;
        }

        /* 解析格子 */
        .analysis-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-top: none;
            padding: 20px 20px 24px;
        }
        .analysis-title {
            font-size: 0.72em; letter-spacing: 0.2em;
            color: var(--text-tertiary); font-weight: 600;
            margin-bottom: 14px; text-align: center;
        }
        .analysis-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .analysis-item {
            background: var(--grid-bg);
            border-radius: 18px; padding: 16px 14px;
            display: flex; flex-direction: column; gap: 6px;
            border: 1px solid var(--border);
            transition: transform 0.2s;
        }
        .analysis-item:active { transform: scale(0.97); }
        .a-icon { font-size: 1.4em; }
        .a-label {
            font-size: 0.72em; color: var(--text-tertiary);
            font-weight: 600; letter-spacing: 0.1em;
        }
        .a-value {
            font-size: 0.9em; color: var(--text-primary);
            font-weight: 700; line-height: 1.3;
        }

        /* AI解籤 */
        .ai-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-top: none;
            border-radius: 0 0 24px 24px;
            padding: 20px 20px 24px;
        }
        .ai-header {
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 14px;
        }
        .ai-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-blue), #5ac8fa);
            box-shadow: 0 0 6px rgba(10,132,255,0.5);
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.7;transform:scale(1.2)} }
        .ai-title {
            font-size: 0.78em; font-weight: 700;
            color: var(--accent-blue); letter-spacing: 0.1em;
        }
        .ai-text {
            font-size: 0.92em; color: var(--text-secondary);
            line-height: 1.75; font-weight: 400;
            min-height: 60px;
        }
        .ai-text.typing::after {
            content: '▍';
            animation: blink 0.7s infinite;
            color: var(--accent-blue);
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

        /* 重新求籤 */
        .reload-card {
            background: var(--bg-card);
            border-radius: 18px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            padding: 16px 20px;
            margin-top: 12px;
        }

        /* ── 毛玻璃彈窗 ── */
        #glass-overlay {
            position: fixed; inset: 0;
            background: var(--overlay-bg);
            visibility: hidden; opacity: 0;
            display: flex; justify-content: center; align-items: center;
            z-index: 999;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        #glass-overlay.active { visibility: visible; opacity: 1; }
        @keyframes fadeIn { from{opacity:0} to{opacity:1} }

        #glass-card {
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: 32px; padding: 44px 40px;
            width: min(85%, 320px);
            text-align: center;
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            box-shadow: var(--shadow-lg);
            animation: cardPop 0.4s cubic-bezier(0.34,1.56,0.64,1);
        }
        @keyframes cardPop { from{opacity:0;transform:scale(0.8)} to{opacity:1;transform:scale(1)} }

        #cup-icon { font-size: 56px; margin-bottom: 14px; display: block; }
        #cup-text {
            font-family: 'Noto Serif TC', serif;
            font-size: 1.2em; font-weight: 700;
            letter-spacing: 0.06em; color: var(--text-primary);
            line-height: 1.4;
        }
        #cup-sub {
            font-size: 0.78em; color: var(--text-tertiary);
            margin-top: 6px; font-weight: 400;
            white-space: pre-line; line-height: 1.6;
        }

        /* ── 擲筊動畫 ── */
        .cups-row {
            display: flex; gap: 16px; justify-content: center;
            margin: 16px 0;
        }
        .cup {
            width: 42px; height: 26px;
            background: linear-gradient(135deg, #c8860b, #a06018);
            border-radius: 50%;
            box-shadow: 0 3px 8px rgba(0,0,0,0.2);
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
            position: relative;
        }
        .cup.flip { animation: cupFlip 0.6s cubic-bezier(0.4,0,0.2,1) forwards; }
        .cup { animation: none; }
        @keyframes cupFlip {
            0%{transform:rotateX(0)} 50%{transform:rotateX(180deg)} 100%{transform:rotateX(0)}
        }

        /* ── 步驟指示 ── */
        .steps-row {
            display: flex; align-items: center; justify-content: center;
            gap: 0; margin-bottom: 28px; width: 100%;
        }
        .step-dot {
            width: 28px; height: 28px; border-radius: 50%;
            background: var(--bg-input); border: 1.5px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.7em; font-weight: 700; color: var(--text-tertiary);
            transition: all 0.4s;
            flex-shrink: 0;
        }
        .step-dot.active {
            background: linear-gradient(135deg, var(--accent-red), var(--accent-gold));
            border-color: transparent; color: white;
            box-shadow: 0 3px 10px rgba(192,57,43,0.35);
        }
        .step-line {
            flex: 1; height: 2px; max-width: 40px;
            background: var(--bg-input); border-radius: 1px;
            transition: background 0.4s;
        }
        .step-line.active { background: linear-gradient(90deg, var(--accent-red), var(--accent-gold)); }

        /* ── 歷史籤記 ── */
        .history-row {
            display: flex; gap: 8px; flex-wrap: wrap;
            justify-content: center; margin-top: 4px;
        }
        .history-chip {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 12px; padding: 6px 12px;
            font-size: 0.72em; color: var(--text-secondary);
            font-weight: 500; cursor: default;
        }

        @media (min-width: 430px) {
            body { padding: 24px 20px 32px; }
            .hero-title { font-size: 2.5em; }
        }
    </style>
</head>

        <div id="cup-sub">靜心祈求，稍候片刻</div>
    </div>
</div>

<script>
    /* ── 深淺模式切換（同步執行避免閃白） ── */
    const html = document.documentElement;
    const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    html.setAttribute('data-theme', savedTheme);

    const toggle = document.getElementById('themeToggle');
    toggle.addEventListener('click', () => {
        const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
    });

    /* ── 籤詩資料 ── */
    const fortuneData = [
        {
            name: "第一籤", luck: "✦ 大吉",
            poem: "雲開霧散見青天\n萬事如意皆自然\n且待東風傳好報\n佳音頃刻到門前",
            explain: { money: "財源廣進", love: "天作之合", work: "升遷有望", health: "體健神旺" },
            ai: "此籤大吉，象徵撥雲見日、萬事順遂。一切阻礙即將消散，好消息將從四面八方湧來。心誠則靈，保持正向態度，貴人即將在關鍵時刻出現相助，凡事可積極行動，把握良機。"
        },
        {
            name: "第十二籤", luck: "◎ 中吉",
            poem: "長江風浪漸漸靜\n于今得進可安寧\n必有貴人相扶助\n凶事脫出見太平",
            explain: { money: "先難後易", love: "細水長流", work: "遇貴人助", health: "漸入佳境" },
            ai: "此籤中吉，暗示歷經風浪後終將迎來安寧。雖眼前可能遭遇困阻，但勿因一時挫折而氣餒，靜待時機成熟，自然有貴人從旁扶持，局勢終將轉危為安、化險為夷。"
        },
        {
            name: "第二五籤", luck: "△ 平吉",
            poem: "走馬看花花不久\n凡事求穩不求快\n莫聽小人言語誘\n守得雲開見月明",
            explain: { money: "守稱為上", love: "切莫焦急", work: "穩紮穩打", health: "多加休養" },
            ai: "此籤平吉，提示凡事宜穩健行事，切忌急進冒進。目前局勢如走馬看花，繁華中暗藏虛幻，應提防周遭小人之言，堅守本心、沉著應對，待時局明朗，光明自然現前。"
        },
        {
            name: "第三十三籤", luck: "✦ 上吉",
            poem: "春風吹動百花開\n時來運轉自然來\n把握機緣莫猶豫\n鴻圖大展展英才",
            explain: { money: "橫財有機", love: "喜事將近", work: "大展宏圖", health: "精神飽滿" },
            ai: "此籤上吉，春風送暖、百花齊放，象徵大好時機即將到來。運勢正處高峰，切勿猶豫不決錯失良機，宜主動出擊、勇敢嘗試，凡事積極謀劃，鴻圖事業指日可待。"
        },
        {
            name: "第四八籤", luck: "▽ 末吉",
            poem: "風雨交加路難行\n暫且忍耐守其心\n前方曙光終可見\n苦盡甘來笑顏春",
            explain: { money: "謹慎守財", love: "耐心經營", work: "臥薪嚐膽", health: "注意調養" },
            ai: "此籤末吉，提示當前處境較為艱難，如同風雨交加、前路崎嶇。此時最忌衝動行事，應收斂鋒芒、靜待時機。逆境磨礪意志，若能咬牙堅持、守住本心，苦盡甘來之日終將到來。"
        }
    ];

    let selectedStick = null;

    function vibrate(p) { if (navigator.vibrate) navigator.vibrate(p); }

    function updateSteps(step) {
        for (let i = 1; i <= 3; i++) {
            document.getElementById('step' + i).classList.toggle('active', i <= step);
            if (i < 3) document.getElementById('line' + i).classList.toggle('active', i < step);
        }
    }

    /* ── 重置回搖籤狀態 ── */
    function resetToDrawState() {
        // 隱藏擲筊區塊
        const tossArea = document.getElementById('toss-area');
        tossArea.classList.remove('visible');
        setTimeout(() => { tossArea.style.display = 'none'; }, 300);

        // 步驟退回第一步
        updateSteps(1);

        // 重置籤筒 — 讓它重新可點擊
        const potStage = document.getElementById('potStage');
        if (potStage) {
            potStage.onclick = startDraw;
            potStage.style.cursor = 'pointer';
            potStage.style.opacity = '1';
        }
        // 相容舊版 potOuter
        const potOuter = document.getElementById('potOuter');
        if (potOuter) {
            potOuter.onclick = startDraw;
            potOuter.style.cursor = 'pointer';
        }

        document.getElementById('potLabel').textContent = '再次誠心祈求，重新搖籤';
        selectedStick = null;

        // 捲回籤筒
        setTimeout(() => window.scrollTo({ top: 0, behavior: 'smooth' }), 100);
    }

    /* ── 搖籤 ── */
    function startDraw() {
        // 防止重複點擊
        const potStage = document.getElementById('potStage');
        const potOuter = document.getElementById('potOuter');
        const activePot = potStage || potOuter;
        if (!activePot) return;

        // 偵測是否正在搖晃（用 potStage 或 fortune-pot）
        const shakingTarget = potStage || document.getElementById('fortune-pot');
        if (shakingTarget && shakingTarget.classList.contains('shaking')) return;

        vibrate(350);
        shakingTarget.classList.add('shaking');
        activePot.onclick = null; // 搖晃中禁止再點
        document.getElementById('potLabel').textContent = '籤詩正在顯靈...';

        setTimeout(() => {
            shakingTarget.classList.remove('shaking');
            selectedStick = fortuneData[Math.floor(Math.random() * fortuneData.length)];
            document.getElementById('potLabel').textContent = '已抽得一籤';
            activePot.style.cursor = 'default';

            const tossArea = document.getElementById('toss-area');
            tossArea.style.display = 'block';
            requestAnimationFrame(() => tossArea.classList.add('visible'));
            updateSteps(2);
            setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }), 100);
        }, 1400);
    }

    /* ── 擲筊 ── */
    function startToss() {
        const overlay = document.getElementById('glass-overlay');
        const icon = document.getElementById('cup-icon');
        const text = document.getElementById('cup-text');
        const sub  = document.getElementById('cup-sub');

        // 重置彈窗內容
        icon.textContent = '🙏';
        text.textContent = '正在請示神明...';
        text.style.color = '';
        sub.textContent  = '靜心祈求，稍候片刻';
        overlay.classList.add('active');
        vibrate([60, 30, 60]);

        // 擲筊動畫：強制 reflow 確保每次重播
        const cup1 = document.getElementById('cup1');
        const cup2 = document.getElementById('cup2');
        if (cup1 && cup2) {
            cup1.classList.remove('flip'); cup2.classList.remove('flip');
            void cup1.offsetWidth;
            cup1.classList.add('flip'); cup2.classList.add('flip');
        }

        setTimeout(() => {
            const isHoly = Math.random() < 0.55;

            if (isHoly) {
                // ── 聖筊 ──
                icon.textContent = '✨';
                text.textContent = '聖筊';
                text.style.color = 'var(--accent-green)';
                sub.textContent  = '神明應允，此籤有靈驗';
                vibrate([100, 50, 100]);
                triggerConfetti();

                setTimeout(() => {
                    overlay.classList.remove('active');
                    updateSteps(3);
                    showFinalResult();
                }, 1600);

            } else {
                // ── 笑筊：提示後自動重置回搖籤 ──
                icon.textContent = '🙅';
                text.textContent = '笑筊';
                text.style.color = 'var(--accent-red)';
                sub.textContent  = '神明微笑，此籤緣分未到\n請重新誠心祈求…';
                vibrate([80, 40, 80]);

                if (cup1 && cup2) {
                    cup1.classList.remove('flip');
                    cup2.classList.remove('flip');
                }

                // 2 秒後關彈窗，再 400ms 後平順重置回第一步
                setTimeout(() => {
                    overlay.classList.remove('active');
                    setTimeout(() => resetToDrawState(), 400);
                }, 2200);
            }
        }, 1100);
    }

    /* ── 彩帶灑花 ── */
    function triggerConfetti() {
        confetti({ particleCount: 140, spread: 80, origin: { y: 0.55 }, colors: ['#c0392b','#ffd700','#ffffff','#0a84ff','#30d158'] });
        setTimeout(() => {
            confetti({ particleCount: 60, angle: 55, spread: 60, origin: { x: 0 }, colors: ['#c0392b','#ffd700'] });
            confetti({ particleCount: 60, angle: 125, spread: 60, origin: { x: 1 }, colors: ['#c0392b','#ffd700'] });
        }, 250);
        setTimeout(() => confetti({ particleCount: 40, spread: 50, origin: { y: 0.3 }, colors: ['#ffffff','#ffd700','#c0392b'] }), 500);
    }

    /* ── 顯示結果 ── */
    function showFinalResult() {
        document.getElementById('toss-area').style.display = 'none';

        const stick = selectedStick;
        document.getElementById('r-name').textContent = stick.name;
        document.getElementById('r-luck').textContent = stick.luck;
        document.getElementById('r-poem').textContent = stick.poem;
        document.getElementById('a-money').textContent = stick.explain.money;
        document.getElementById('a-love').textContent = stick.explain.love;
        document.getElementById('a-work').textContent = stick.explain.work;
        document.getElementById('a-health').textContent = stick.explain.health;

        document.getElementById('result-box').style.display = 'block';
        requestAnimationFrame(() => document.getElementById('result-box').classList.add('visible'));

        // 打字機效果
        const aiEl = document.getElementById('ai-text');
        aiEl.textContent = '';
        aiEl.classList.add('typing');
        const text = stick.ai;
        let i = 0;
        const typeInterval = setInterval(() => {
            aiEl.textContent += text[i];
            i++;
            if (i >= text.length) {
                clearInterval(typeInterval);
                aiEl.classList.remove('typing');
            }
        }, 35);

        setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }), 200);
    }

    /* ── 搖晃手機抽籤 (DeviceMotion) ── */
    (function setupShake() {
        const THRESHOLD = 18;   // 搖晃靈敏度 (m/s²)
        const COOLDOWN  = 1800; // 兩次觸發最短間隔 ms
        let lastShake = 0;
        let lastX = 0, lastY = 0, lastZ = 0;
        let motionSupported = false;

        function onMotion(e) {
            const acc = e.accelerationIncludingGravity;
            if (!acc) return;
            const { x, y, z } = acc;
            const delta = Math.abs(x - lastX) + Math.abs(y - lastY) + Math.abs(z - lastZ);
            lastX = x; lastY = y; lastZ = z;

            if (delta > THRESHOLD) {
                const now = Date.now();
                if (now - lastShake < COOLDOWN) return;
                lastShake = now;

                // 只有在第一步（可以抽籤）時才響應
                const potStage = document.getElementById('potStage');
                if (!potStage || potStage.classList.contains('shaking')) return;
                if (document.getElementById('toss-area').style.display === 'block') return;
                if (document.getElementById('result-box').classList.contains('visible')) return;

                // 短震動回饋
                if (navigator.vibrate) navigator.vibrate([30, 20, 30]);

                // 視覺回饋：光暈增強
                potStage.classList.add('motion-active');
                setTimeout(() => potStage.classList.remove('motion-active'), 600);

                startDraw();
            }
        }

        function startListening() {
            window.addEventListener('devicemotion', onMotion);
            motionSupported = true;
            // 顯示提示文字
            setTimeout(() => {
                const hint = document.getElementById('shakeHint');
                if (hint) hint.classList.add('visible');
            }, 800);
        }

        // iOS 13+ 需要使用者授權
        if (typeof DeviceMotionEvent !== 'undefined' &&
            typeof DeviceMotionEvent.requestPermission === 'function') {
            // 在使用者第一次點擊籤筒時請求權限
            const potStage = document.getElementById('potStage');
            let permAsked = false;
            const askPermission = function() {
                if (permAsked) return;
                permAsked = true;
                DeviceMotionEvent.requestPermission()
                    .then(state => {
                        if (state === 'granted') startListening();
                    })
                    .catch(() => {});
            };
            if (potStage) potStage.addEventListener('touchstart', askPermission, { once: true });
        } else if (typeof DeviceMotionEvent !== 'undefined') {
            // Android / 舊版 iOS — 直接監聽
            startListening();
        }
    })();
</script>
