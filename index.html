<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>線上宮廟 - 誠心求籤 (簡潔版)</title>
    <style>
        /* 基本風格與 Apple 風格毛玻璃預設 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f5f7;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; color: #1d1d1f;
        }

        h1 { color: #b32d2e; font-weight: 600; }
        .sub-title { color: #86868b; font-size: 0.9em; margin-bottom: 40px; }

        /* --- 籤筒 --- */
        #fortune-pot {
            width: 100px; height: 160px;
            background: linear-gradient(145deg, #d32f2f, #b71c1c);
            border: 3px solid #801a1a; border-radius: 12px 12px 45px 45px;
            cursor: pointer; display: flex; justify-content: center; align-items: flex-start;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #fortune-pot:active { transform: scale(0.92); }
        .stick-dec { width: 6px; height: 50px; background: #ffd700; margin: 0 2px; border-radius: 3px; }

        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            20% { transform: rotate(15deg); }
            40% { transform: rotate(-15deg); }
            60% { transform: rotate(10deg); }
            80% { transform: rotate(-10deg); }
        }
        .shaking { animation: shake 0.5s infinite; }

        /* --- 按鈕 --- */
        .apple-btn {
            margin-top: 25px; padding: 12px 28px;
            background-color: #0071e3; color: white;
            border: none; border-radius: 20px; font-weight: 500;
            cursor: pointer; transition: all 0.2s;
        }
        .apple-btn:disabled { background-color: #d2d2d7; color: #86868b; }

        /* --- 毛玻璃彈窗 (Glassmorphism) --- */
        #glass-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.2);
            display: none; justify-content: center; align-items: center;
            backdrop-filter: blur(0px); transition: backdrop-filter 0.4s ease;
            z-index: 9999;
        }
        #glass-overlay.active { display: flex; backdrop-filter: blur(12px); }

        #glass-card {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 28px; padding: 40px; width: 280px; text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            transform: scale(0.8); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #glass-overlay.active #glass-card { transform: scale(1); }

        #cup-icon { font-size: 70px; display: block; margin-bottom: 10px; }
        #cup-text { font-size: 1.5em; font-weight: 600; }

        /* --- 籤詩結果 --- */
        #result-box {
            display: none; margin-top: 30px; padding: 30px;
            background: #fff; border-radius: 20px; width: 85%; max-width: 350px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08); text-align: center;
            animation: slideUp 0.6s ease;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .poem-content { line-height: 2; color: #424245; white-space: pre-line; margin-top: 15px; font-size: 1.1em; }
    </style>
</head>
<body>

    <h1>🏮 線上求籤 🏮</h1>
    <p class="sub-title">點擊籤筒，誠心祈求指引</p>

    <div id="fortune-pot" onclick="draw()">
        <div class="stick-dec"></div><div class="stick-dec"></div><div class="stick-dec"></div>
    </div>

    <div id="toss-area" style="display:none; text-align:center; margin-top:20px;">
        <p>已得一籤，請擲筊確認神意</p>
        <button class="apple-btn" onclick="toss()">擲筊 (搏杯)</button>
    </div>

    <div id="result-box">
        <h2 id="r-name" style="margin:0; color:#b32d2e;"></h2>
        <b id="r-luck" style="color:#d35400;"></b>
        <div class="poem-content" id="r-poem"></div>
        <button class="apple-btn" style="background:#f5f5f7; color:#0071e3; margin-top:20px;" onclick="location.reload()">重新求籤</button>
    </div>

    <div id="glass-overlay" onclick="this.classList.remove('active')">
        <div id="glass-card" onclick="event.stopPropagation()">
            <span id="cup-icon">⏳</span>
            <div id="cup-text">擲筊中...</div>
        </div>
    </div>

    <script>
        const fortuneData = [
            { name: "第一籤", luck: "大吉", poem: "雲開霧散見青天，\n萬事如意皆自然。\n且待東風傳好報，\n佳音頃刻到門前。" },
            { name: "第十二籤", luck: "中吉", poem: "長江風浪漸漸靜，\n于今得進可安寧。\n必有貴人相扶助，\n兇事脫出見太平。" },
            { name: "第三十籤", luck: "平吉", poem: "漸漸濃雲散，\n看看月再明。\n雖然遭遇處，\n且且待時亨。" }
        ];

        let selectedStick = null;

        function vibrate(pattern) {
            if (navigator.vibrate) navigator.vibrate(pattern);
        }

        // 抽籤
        function draw() {
            vibrate(300);
            const pot = document.getElementById('fortune-pot');
            pot.classList.add('shaking');
            
            setTimeout(() => {
                pot.classList.remove('shaking');
                selectedStick = fortuneData[Math.floor(Math.random() * fortuneData.length)];
                document.getElementById('toss-area').style.display = 'block';
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }, 1200);
        }

        // 擲筊
        function toss() {
            const overlay = document.getElementById('glass-overlay');
            const icon = document.getElementById('cup-icon');
            const text = document.getElementById('cup-text');

            overlay.classList.add('active');
            icon.innerText = "⏳";
            text.innerText = "擲筊中...";
            vibrate([50, 30, 50]);

            setTimeout(() => {
                const rand = Math.random();
                if (rand < 0.5) { // 50% 聖筊
                    icon.innerText = "🙏";
                    text.innerText = "聖筊：神明應允";
                    text.style.color = "#28a745";
                    vibrate(200);
                    
                    setTimeout(() => {
                        overlay.classList.remove('active');
                        showResult();
                    }, 1500);
                } else {
                    const isLaugh = Math.random() > 0.5;
                    icon.innerText = isLaugh ? "😄" : "😡";
                    text.innerText = isLaugh ? "笑筊：再求一次" : "陰筊：神明不允";
                    text.style.color = "#d32f2f";
                    
                    // 不允的話，點擊背景可關閉重試
                    setTimeout(() => {
                        overlay.classList.remove('active');
                    }, 2000);
                }
            }, 1000);
        }

        function showResult() {
            document.getElementById('toss-area').style.display = 'none';
            const box = document.getElementById('result-box');
            document.getElementById('r-name').innerText = selectedStick.name;
            document.getElementById('r-luck').innerText = `【${selectedStick.luck}】`;
            document.getElementById('r-poem').innerText = selectedStick.poem;
            box.style.display = 'block';
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }
    </script>
</body>
</html>
